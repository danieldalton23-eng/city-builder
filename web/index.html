<!DOCTYPE html>
<html>
<head>
  <base href="/city-builder/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="CityBuilder — a Flutter city-building game.">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="CityBuilder">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>CityBuilder</title>
  <link rel="manifest" href="manifest.json">
  <script>
    // Unregister any stale service workers so the latest build is always served.
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for (let reg of registrations) { reg.unregister(); }
      });
    }
    // Clear all caches so the browser fetches fresh assets.
    if ('caches' in window) {
      caches.keys().then(function(names) {
        for (let name of names) { caches.delete(name); }
      });
    }
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
